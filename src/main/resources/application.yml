server:
  port: 8080

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

  spring:
    datasource:
      url: jdbc:h2:mem:headhanterdb;MODE=PostgreSQL
      driver-class-name: org.h2.Driver
      username: sa
      password: ""
    h2:
      console:
        enabled: true
        path: /h2-console
    sql:
      init:
        mode: always